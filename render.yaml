# Render Blueprint — backend API
# Dashboard: https://dashboard.render.com
services:
  - type: web
    name: anagha-backend
    runtime: node
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # Octis ERP public catalog (BFF) — set in Render dashboard
      - key: ERP_API_URL
        sync: false
      - key: ERP_STORE_SLUG
        sync: false
      - key: ERP_BRANCH_ID
        sync: false
